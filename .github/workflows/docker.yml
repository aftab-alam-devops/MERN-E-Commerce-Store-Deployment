name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # 🔐 Login to DockerHub
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🔨 Build Backend
    - name: Build Backend
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-app-backend ./backend

    # 📤 Push Backend
    - name: Push Backend
      run: docker push ${{ secrets.DOCKER_USERNAME }}/mern-app-backend

    # 🔨 Build Frontend
    - name: Build Frontend
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-app-frontend ./frontend

    # 📤 Push Frontend
    - name: Push Frontend
      run: docker push ${{ secrets.DOCKER_USERNAME }}/mern-app-frontend

    # 🚀 Deploy to EC2
    - name: Deploy on EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/mern-app-backend
          docker pull ${{ secrets.DOCKER_USERNAME }}/mern-app-frontend

          docker stop backend || true
          docker rm backend || true
          docker stop frontend || true
          docker rm frontend || true

          docker run -d -p 5000:5000 --name backend ${{ secrets.DOCKER_USERNAME }}/mern-app-backend
          docker run -d -p 80:80 --name frontend ${{ secrets.DOCKER_USERNAME }}/mern-app-frontend